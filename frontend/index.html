<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UARC — Universal Automation</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<script>
  tailwind.config = {
    darkMode: 'class',
    theme: {
      extend: {
        colors: {
          arc: { 400: '#7c6af7', 500: '#6654f3', 600: '#5546e0', 700: '#4438c0' },
        }
      }
    }
  }
</script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; background: #0d0d0f; color: #e5e5e5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: #1a1a1e; } ::-webkit-scrollbar-thumb { background: #3a3a4a; border-radius: 3px; }
  .chat-bubble { animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .typing-dot { animation: blink 1.4s infinite both; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%, 80%, 100% { opacity: 0.2; } 40% { opacity: 1; } }
  .glow { box-shadow: 0 0 20px rgba(102, 84, 243, 0.3); }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const API_BASE = window.location.origin.includes("localhost:3000")
  ? ""
  : "http://localhost:3000";

// ─── Icons ───────────────────────────────────────────────────
const IconSend = () => (
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
    <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
  </svg>
);

const IconWallet = () => (
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M20 12V22H4V12"/><path d="M22 7H2v5h20V7z"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
  </svg>
);

const IconTask = () => (
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
  </svg>
);

const IconCircle = () => (
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
  </svg>
);

const IconChevron = () => (
  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
    <polyline points="9 18 15 12 9 6"/>
  </svg>
);

const IconX = () => (
  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
    <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
  </svg>
);

const IconExternalLink = () => (
  <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
  </svg>
);

// ─── Utility ─────────────────────────────────────────────────
const shortAddr = (addr) => addr ? `${addr.slice(0, 6)}…${addr.slice(-4)}` : "";

// ─── Suggested prompts ───────────────────────────────────────
const SUGGESTIONS = [
  "Send 50 USDC to 0x1234...5678 in 2 hours",
  "Bridge 100 USDC to Ethereum in 30 minutes",
  "Transfer 75 EURO when price drops below $0.98",
  "Schedule 200 USDC transfer in 1 day",
];

// ─── Message component ───────────────────────────────────────
function Message({ msg }) {
  const isUser = msg.role === "user";
  const isSystem = msg.role === "system";

  if (isSystem) {
    return (
      <div className="flex justify-center my-2">
        <span className="text-xs text-gray-500 bg-gray-800/50 px-3 py-1 rounded-full">{msg.content}</span>
      </div>
    );
  }

  return (
    <div className={`chat-bubble flex gap-3 mb-4 ${isUser ? "flex-row-reverse" : "flex-row"}`}>
      {!isUser && (
        <div className="w-8 h-8 rounded-full bg-arc-600 flex items-center justify-center text-xs font-bold flex-shrink-0 mt-1">U</div>
      )}
      <div className={`max-w-[75%] ${isUser ? "items-end" : "items-start"} flex flex-col gap-1`}>
        <div className={`px-4 py-3 rounded-2xl text-sm leading-relaxed ${
          isUser
            ? "bg-arc-600 text-white rounded-br-sm"
            : "bg-gray-800/80 text-gray-100 rounded-bl-sm border border-gray-700/50"
        }`}>
          {msg.content}
        </div>
        {msg.card && <TaskCard card={msg.card} />}
        {msg.paymentRequest && <PaymentCard req={msg.paymentRequest} onPaid={msg.onPaid} />}
      </div>
      {isUser && (
        <div className="w-8 h-8 rounded-full bg-gray-600 flex items-center justify-center text-xs font-bold flex-shrink-0 mt-1">
          {msg.avatarInitial || "Y"}
        </div>
      )}
    </div>
  );
}

// ─── Task confirmation card ───────────────────────────────────
function TaskCard({ card }) {
  if (card.type === "success") {
    return (
      <div className="bg-gray-800 border border-green-700/50 rounded-xl p-4 text-sm w-full max-w-sm">
        <div className="flex items-center gap-2 text-green-400 font-medium mb-3">
          <span className="w-2 h-2 rounded-full bg-green-400 inline-block"></span>
          Task Created
        </div>
        <div className="space-y-1.5 text-gray-300">
          <div className="flex justify-between">
            <span className="text-gray-500">Task ID</span>
            <span className="font-mono">#{card.taskId}</span>
          </div>
          {card.txHash && (
            <div className="flex justify-between items-center">
              <span className="text-gray-500">Tx Hash</span>
              <a href={card.explorerUrl} target="_blank" rel="noreferrer"
                className="font-mono text-arc-400 hover:text-arc-300 flex items-center gap-1">
                {card.txHash.slice(0, 10)}… <IconExternalLink />
              </a>
            </div>
          )}
          {card.taskVault && (
            <div className="flex justify-between">
              <span className="text-gray-500">Vault</span>
              <span className="font-mono text-xs">{shortAddr(card.taskVault)}</span>
            </div>
          )}
        </div>
      </div>
    );
  }

  if (card.type === "confirm") {
    return (
      <div className="bg-gray-800 border border-arc-600/40 rounded-xl p-4 text-sm w-full max-w-sm">
        <div className="flex items-center gap-2 text-arc-400 font-medium mb-3">
          <span className="w-2 h-2 rounded-full bg-arc-400 inline-block"></span>
          Task Preview
        </div>
        <div className="space-y-1.5 text-gray-300 mb-3">
          <div className="flex justify-between">
            <span className="text-gray-500">Type</span>
            <span className="text-xs bg-arc-700/40 text-arc-300 px-2 py-0.5 rounded-full">{card.adapterType?.replace(/_/g, " ")}</span>
          </div>
          {card.amount && (
            <div className="flex justify-between">
              <span className="text-gray-500">Amount</span>
              <span>{(Number(card.amount) / 1e6).toFixed(2)} tokens</span>
            </div>
          )}
          {card.executeAfter && (
            <div className="flex justify-between">
              <span className="text-gray-500">Execute after</span>
              <span className="text-xs">{new Date(Number(card.executeAfter) * 1000).toLocaleString()}</span>
            </div>
          )}
        </div>
        <div className="flex gap-2 mt-3">
          <button onClick={card.onConfirm}
            className="flex-1 bg-arc-600 hover:bg-arc-500 text-white text-xs font-medium py-2 rounded-lg transition-colors">
            Confirm & Submit
          </button>
          <button onClick={card.onCancel}
            className="flex-1 bg-gray-700 hover:bg-gray-600 text-gray-300 text-xs font-medium py-2 rounded-lg transition-colors">
            Cancel
          </button>
        </div>
      </div>
    );
  }

  return null;
}

// ─── Payment card ────────────────────────────────────────────
function PaymentCard({ req, onPaid }) {
  const [txInput, setTxInput] = useState("");
  const [status, setStatus] = useState("idle"); // idle | paying | verifying | done | error
  const [errorMsg, setErrorMsg] = useState("");

  const handlePayWithMetamask = async () => {
    if (!window.ethereum) { setErrorMsg("MetaMask not detected"); return; }
    setStatus("paying");
    setErrorMsg("");
    try {
      const provider = new ethers.BrowserProvider(window.ethereum);
      const signer = await provider.getSigner();
      const tx = await signer.sendTransaction({
        to: req.payTo,
        value: ethers.parseEther(req.amount),
      });
      setTxInput(tx.hash);
      setStatus("verifying");
      await tx.wait(1);
      setStatus("done");
      onPaid && onPaid(tx.hash);
    } catch (err) {
      setErrorMsg(err.message?.slice(0, 100) || "Payment failed");
      setStatus("error");
    }
  };

  const handleManualSubmit = () => {
    if (!txInput.startsWith("0x") || txInput.length !== 66) {
      setErrorMsg("Invalid tx hash format");
      return;
    }
    setErrorMsg("");
    onPaid && onPaid(txInput);
  };

  return (
    <div className="bg-gray-800 border border-yellow-700/50 rounded-xl p-4 text-sm w-full max-w-sm">
      <div className="flex items-center gap-2 text-yellow-400 font-medium mb-3">
        <span className="w-2 h-2 rounded-full bg-yellow-400 inline-block animate-pulse"></span>
        Payment Required (x402)
      </div>

      <div className="space-y-1.5 text-gray-300 mb-4">
        <div className="flex justify-between">
          <span className="text-gray-500">Amount</span>
          <span className="font-mono text-yellow-300">{req.amount} ETH</span>
        </div>
        <div className="flex justify-between">
          <span className="text-gray-500">Pay to</span>
          <span className="font-mono text-xs">{shortAddr(req.payTo)}</span>
        </div>
        <div className="flex justify-between">
          <span className="text-gray-500">Network</span>
          <span>{req.network}</span>
        </div>
      </div>

      {status === "done" ? (
        <div className="text-green-400 text-xs text-center py-2">Payment confirmed! Processing task…</div>
      ) : (
        <>
          <button onClick={handlePayWithMetamask} disabled={status === "paying" || status === "verifying"}
            className="w-full bg-yellow-600/20 hover:bg-yellow-600/30 border border-yellow-600/40 text-yellow-300 text-xs font-medium py-2 rounded-lg transition-colors mb-3 disabled:opacity-50">
            {status === "paying" ? "Sending payment…" : status === "verifying" ? "Waiting for confirmation…" : "Pay with MetaMask"}
          </button>

          <div className="text-xs text-gray-500 mb-1.5">Or paste your tx hash:</div>
          <div className="flex gap-2">
            <input
              value={txInput}
              onChange={e => setTxInput(e.target.value)}
              placeholder="0x..."
              className="flex-1 bg-gray-700/50 border border-gray-600 rounded-lg px-2 py-1.5 text-xs font-mono text-gray-300 outline-none focus:border-arc-500"
            />
            <button onClick={handleManualSubmit}
              className="bg-arc-600 hover:bg-arc-500 text-white text-xs font-medium px-3 py-1.5 rounded-lg transition-colors">
              Verify
            </button>
          </div>
          {errorMsg && <div className="text-red-400 text-xs mt-2">{errorMsg}</div>}
        </>
      )}
    </div>
  );
}

// ─── Typing indicator ─────────────────────────────────────────
function TypingIndicator() {
  return (
    <div className="flex gap-3 mb-4">
      <div className="w-8 h-8 rounded-full bg-arc-600 flex items-center justify-center text-xs font-bold flex-shrink-0 mt-1">U</div>
      <div className="bg-gray-800/80 border border-gray-700/50 rounded-2xl rounded-bl-sm px-4 py-3 flex gap-1.5 items-center">
        <span className="typing-dot w-1.5 h-1.5 rounded-full bg-gray-400 inline-block"></span>
        <span className="typing-dot w-1.5 h-1.5 rounded-full bg-gray-400 inline-block"></span>
        <span className="typing-dot w-1.5 h-1.5 rounded-full bg-gray-400 inline-block"></span>
      </div>
    </div>
  );
}

// ─── Task History sidebar item ────────────────────────────────
function HistoryItem({ task, onClick }) {
  const colors = {
    success: "text-green-400",
    pending: "text-yellow-400",
    failed: "text-red-400",
  };
  return (
    <button onClick={onClick}
      className="w-full text-left px-3 py-2.5 rounded-lg hover:bg-gray-800/60 transition-colors group">
      <div className="flex items-center justify-between mb-0.5">
        <span className="text-xs font-mono text-gray-300">Task #{task.taskId}</span>
        <span className={`text-xs ${colors[task.status] || "text-gray-500"}`}>●</span>
      </div>
      <div className="text-xs text-gray-500 truncate">{task.summary}</div>
    </button>
  );
}

// ─── Main App ─────────────────────────────────────────────────
function App() {
  const [messages, setMessages] = useState([
    {
      id: 0,
      role: "assistant",
      content: "Hi! I'm UARC — your on-chain automation agent on Arc. Tell me what you want to automate and I'll set it up for you.\n\nExamples: schedule a token transfer, bridge to another chain, or trigger a transfer based on price.",
    }
  ]);
  const [input, setInput] = useState("");
  const [isTyping, setIsTyping] = useState(false);
  const [wallet, setWallet] = useState(null);
  const [taskHistory, setTaskHistory] = useState([]);
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [pendingIntent, setPendingIntent] = useState(null);
  const [x402Mode, setX402Mode] = useState(false);
  const chatEndRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    chatEndRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, isTyping]);

  const addMessage = useCallback((msg) => {
    setMessages(prev => [...prev, { id: Date.now() + Math.random(), ...msg }]);
  }, []);

  // ── Wallet connection ─────────────────────────────────────
  const connectWallet = async () => {
    if (!window.ethereum) {
      addMessage({ role: "system", content: "MetaMask not detected. Install MetaMask or use the free endpoint." });
      return;
    }
    try {
      const provider = new ethers.BrowserProvider(window.ethereum);
      await provider.send("eth_requestAccounts", []);
      const signer = await provider.getSigner();
      const address = await signer.getAddress();
      const network = await provider.getNetwork();
      setWallet({ address, network: network.chainId.toString() });
      addMessage({ role: "system", content: `Wallet connected: ${shortAddr(address)}` });
    } catch (err) {
      addMessage({ role: "system", content: `Wallet connection failed: ${err.message}` });
    }
  };

  const disconnectWallet = () => {
    setWallet(null);
    addMessage({ role: "system", content: "Wallet disconnected." });
  };

  // ── Submit prompt to agent ────────────────────────────────
  const sendMessage = async (text) => {
    const trimmed = (text || input).trim();
    if (!trimmed) return;
    setInput("");

    addMessage({
      role: "user",
      content: trimmed,
      avatarInitial: wallet ? shortAddr(wallet.address)[0].toUpperCase() : "Y",
    });

    setIsTyping(true);

    try {
      if (x402Mode) {
        await handleX402Flow(trimmed);
      } else {
        await handleFreeFlow(trimmed);
      }
    } catch (err) {
      addMessage({ role: "assistant", content: `Error: ${err.message}` });
    } finally {
      setIsTyping(false);
    }
  };

  // ── Free endpoint (no payment) ───────────────────────────
  const handleFreeFlow = async (intent) => {
    const resp = await fetch(`${API_BASE}/task/create-from-prompt`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ intent, userAddress: wallet?.address }),
    });

    const data = await resp.json();

    if (!resp.ok) {
      addMessage({ role: "assistant", content: `Failed to create task: ${data.error}` });
      return;
    }

    const task = { taskId: data.taskId, summary: data.summary, status: "success", txHash: data.txHash, taskVault: data.taskVault };
    setTaskHistory(h => [task, ...h]);

    addMessage({
      role: "assistant",
      content: `Your automation task has been created on Arc Testnet.`,
      card: {
        type: "success",
        taskId: data.taskId,
        txHash: data.txHash,
        taskVault: data.taskVault,
        explorerUrl: data.explorerUrl,
      },
    });
  };

  // ── x402 endpoint flow ────────────────────────────────────
  const handleX402Flow = async (intent) => {
    // Step 1: hit endpoint without payment
    const resp1 = await fetch(`${API_BASE}/task/create-from-prompt-x402`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ intent, userAddress: wallet?.address }),
    });

    if (resp1.status === 402) {
      const data = await resp1.json();
      addMessage({
        role: "assistant",
        content: `This endpoint requires a small payment of ${data.x402.amount} ETH to Arc Testnet. Once paid, your task will be created.`,
        paymentRequest: data.x402,
        onPaid: (txHash) => retryWithPayment(intent, txHash),
      });
      return;
    }

    const data = await resp1.json();
    if (!resp1.ok) {
      addMessage({ role: "assistant", content: `Error: ${data.error}` });
      return;
    }
    finishTask(data);
  };

  const retryWithPayment = async (intent, txHash) => {
    setIsTyping(true);
    try {
      const resp = await fetch(`${API_BASE}/task/create-from-prompt-x402`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "X-Payment-Tx": txHash,
        },
        body: JSON.stringify({ intent, userAddress: wallet?.address }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        addMessage({ role: "assistant", content: `Task creation failed after payment: ${data.error}` });
        return;
      }
      finishTask(data);
    } catch (err) {
      addMessage({ role: "assistant", content: `Error after payment: ${err.message}` });
    } finally {
      setIsTyping(false);
    }
  };

  const finishTask = (data) => {
    const task = { taskId: data.taskId, summary: data.summary || "Task", status: "success", txHash: data.txHash };
    setTaskHistory(h => [task, ...h]);
    addMessage({
      role: "assistant",
      content: `Task created successfully!${data.paymentVerified ? " Payment verified." : ""}`,
      card: {
        type: "success",
        taskId: data.taskId,
        txHash: data.txHash,
        taskVault: data.taskVault,
        explorerUrl: data.explorerUrl,
      },
    });
  };

  const handleKeyDown = (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  };

  // ── Render ────────────────────────────────────────────────
  return (
    <div className="flex h-screen bg-gray-950 text-gray-100">

      {/* Sidebar */}
      <div className={`${sidebarOpen ? "w-64" : "w-0"} flex-shrink-0 transition-all duration-300 overflow-hidden bg-gray-900 border-r border-gray-800 flex flex-col`}>
        <div className="p-4 border-b border-gray-800">
          <div className="flex items-center gap-2 mb-1">
            <div className="w-7 h-7 rounded-lg bg-arc-600 flex items-center justify-center text-xs font-bold">U</div>
            <span className="font-semibold text-sm">UARC</span>
          </div>
          <p className="text-xs text-gray-500">Universal Automation on Arc</p>
        </div>

        {/* Wallet section */}
        <div className="p-3 border-b border-gray-800">
          {wallet ? (
            <div className="space-y-2">
              <div className="flex items-center gap-2 text-xs text-green-400">
                <span className="w-1.5 h-1.5 rounded-full bg-green-400"></span>
                Connected
              </div>
              <div className="font-mono text-xs text-gray-400 bg-gray-800/60 px-2 py-1.5 rounded-lg">{shortAddr(wallet.address)}</div>
              <button onClick={disconnectWallet}
                className="w-full text-xs text-gray-500 hover:text-red-400 transition-colors">
                Disconnect
              </button>
            </div>
          ) : (
            <button onClick={connectWallet}
              className="w-full flex items-center justify-center gap-2 bg-arc-600/20 hover:bg-arc-600/30 border border-arc-600/30 text-arc-300 text-xs font-medium py-2 rounded-lg transition-colors">
              <IconWallet /> Connect Wallet
            </button>
          )}
        </div>

        {/* Circle wallet note */}
        <div className="px-3 py-2 border-b border-gray-800">
          <div className="flex items-center gap-2 text-xs text-gray-500 bg-gray-800/40 rounded-lg px-2 py-2">
            <IconCircle />
            <div>
              <div className="text-gray-400 font-medium">Circle Wallets</div>
              <div className="text-gray-600">Embedded wallet — coming soon</div>
            </div>
          </div>
        </div>

        {/* Mode toggle */}
        <div className="px-3 py-2 border-b border-gray-800">
          <div className="text-xs text-gray-500 mb-1.5">API Mode</div>
          <div className="flex rounded-lg overflow-hidden border border-gray-700">
            <button
              onClick={() => setX402Mode(false)}
              className={`flex-1 text-xs py-1.5 transition-colors ${!x402Mode ? "bg-arc-600 text-white" : "text-gray-400 hover:text-gray-300"}`}>
              Free
            </button>
            <button
              onClick={() => setX402Mode(true)}
              className={`flex-1 text-xs py-1.5 transition-colors ${x402Mode ? "bg-yellow-600/80 text-white" : "text-gray-400 hover:text-gray-300"}`}>
              x402
            </button>
          </div>
          {x402Mode && (
            <p className="text-xs text-yellow-600 mt-1.5">Requires 0.0001 ETH payment per task</p>
          )}
        </div>

        {/* Task history */}
        <div className="flex-1 overflow-y-auto p-2">
          <div className="text-xs text-gray-500 px-2 py-1.5 font-medium">TASK HISTORY</div>
          {taskHistory.length === 0 ? (
            <div className="text-xs text-gray-600 px-3 py-2">No tasks yet</div>
          ) : (
            taskHistory.map((t, i) => (
              <HistoryItem key={i} task={t} onClick={() => {}} />
            ))
          )}
        </div>
      </div>

      {/* Main chat area */}
      <div className="flex-1 flex flex-col min-w-0">
        {/* Header */}
        <div className="h-12 border-b border-gray-800 flex items-center justify-between px-4 bg-gray-900/50">
          <button onClick={() => setSidebarOpen(s => !s)}
            className="text-gray-400 hover:text-gray-200 p-1 rounded transition-colors">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <div className="text-sm font-medium text-gray-300">UARC Agent</div>
          <div className="flex items-center gap-2 text-xs text-gray-500">
            <span className={`w-1.5 h-1.5 rounded-full ${x402Mode ? "bg-yellow-400" : "bg-green-400"}`}></span>
            {x402Mode ? "x402 mode" : "free mode"}
          </div>
        </div>

        {/* Messages */}
        <div className="flex-1 overflow-y-auto px-4 py-6 space-y-0">
          <div className="max-w-3xl mx-auto">
            {messages.map(msg => <Message key={msg.id} msg={msg} />)}
            {isTyping && <TypingIndicator />}
            <div ref={chatEndRef} />
          </div>
        </div>

        {/* Suggestions */}
        {messages.length <= 2 && (
          <div className="px-4 pb-2">
            <div className="max-w-3xl mx-auto">
              <div className="flex flex-wrap gap-2 justify-center">
                {SUGGESTIONS.map((s, i) => (
                  <button key={i} onClick={() => sendMessage(s)}
                    className="text-xs text-gray-400 bg-gray-800/60 hover:bg-gray-800 border border-gray-700/50 px-3 py-1.5 rounded-full transition-colors">
                    {s}
                  </button>
                ))}
              </div>
            </div>
          </div>
        )}

        {/* Input */}
        <div className="px-4 pb-4 pt-2">
          <div className="max-w-3xl mx-auto">
            <div className="flex items-end gap-2 bg-gray-800 border border-gray-700 rounded-2xl px-4 py-3 focus-within:border-arc-500/60 transition-colors glow">
              <textarea
                ref={inputRef}
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={handleKeyDown}
                placeholder="Describe your automation task…"
                rows={1}
                className="flex-1 bg-transparent text-sm text-gray-100 placeholder-gray-500 outline-none resize-none max-h-32 leading-relaxed"
                style={{ minHeight: "24px" }}
              />
              <button
                onClick={() => sendMessage()}
                disabled={!input.trim() || isTyping}
                className="w-8 h-8 rounded-xl bg-arc-600 hover:bg-arc-500 disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center text-white transition-colors flex-shrink-0">
                <IconSend />
              </button>
            </div>
            <p className="text-xs text-gray-600 text-center mt-2">
              Arc Testnet (Chain 5042002) • Powered by Mistral AI
            </p>
          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
