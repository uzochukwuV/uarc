<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>UARC — Onchain AI Agent Chat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;450;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="uarc.css" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #0e0f12; font-family: 'Inter Tight', system-ui, sans-serif; }
  #root { height: 100vh; width: 100vw; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="chat-engine.jsx"></script>
<script type="text/babel" src="uarc-shell.jsx"></script>

<script type="text/babel" data-presets="env,react">
const { useState } = React;

function VariantArtboard({ variant, defaultMode }) {
  const [mode, setMode] = useState(defaultMode);
  return (
    <div data-screen-label={`UARC ${variant} ${mode}`} style={{ width: '100%', height: '100%' }}>
      <window.UarcShell variant={variant} mode={mode} onToggleMode={() => setMode(mode === 'dark' ? 'light' : 'dark')} />
    </div>
  );
}

function App() {
  return (
    <window.DesignCanvas
      title="UARC · Onchain AI agent chat"
      subtitle="Two directions for the desktop chat interface — toggle light/dark inside each artboard, click suggestions, send messages, run the full confirm → sign → deploy flow."
    >
      <window.DCSection id="editorial" title="01 · Editorial" subtitle="Bold display type, generous whitespace, expressive moments. Coinbase-spirit blue rendered in OKLCH.">
        <window.DCArtboard id="ed-light" label="Editorial · Light" width={1440} height={900}>
          <VariantArtboard variant="editorial" defaultMode="light" />
        </window.DCArtboard>
        <window.DCArtboard id="ed-dark" label="Editorial · Dark" width={1440} height={900}>
          <VariantArtboard variant="editorial" defaultMode="dark" />
        </window.DCArtboard>
      </window.DCSection>

      <window.DCSection id="terminal" title="02 · Terminal-Precision" subtitle="Dense, data-forward, developer-flavored. Mono everywhere, sharper corners, Base-blue accent.">
        <window.DCArtboard id="tm-light" label="Terminal · Light" width={1440} height={900}>
          <VariantArtboard variant="terminal" defaultMode="light" />
        </window.DCArtboard>
        <window.DCArtboard id="tm-dark" label="Terminal · Dark" width={1440} height={900}>
          <VariantArtboard variant="terminal" defaultMode="dark" />
        </window.DCArtboard>
      </window.DCSection>
    </window.DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
